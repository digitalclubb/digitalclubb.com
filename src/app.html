<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" type="image/svg+xml" />
		<link rel="alternate" type="application/rss+xml" title="Gareth Clubb – Writing" href="/api/rss" />
		<link
			rel="preload"
			href="/fonts/inter-variable-latin.woff2"
			as="font"
			type="font/woff2"
			fetchpriority="high"
			crossorigin
		/>
		<style>
			@font-face {
				font-family: 'Inter';
				font-style: normal;
				font-weight: 100 900;
				font-display: swap;
				src: url('/fonts/inter-variable-latin.woff2') format('woff2');
				unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA,
					U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+2074, U+20AC, U+2122, U+2191,
					U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
			}
			@font-face {
				font-family: 'JetBrains Mono';
				font-style: normal;
				font-weight: 400;
				font-display: swap;
				src: url('/fonts/jetbrains-mono-latin-400.woff2') format('woff2');
				unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA,
					U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+2074, U+20AC, U+2122, U+2191,
					U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
			}
		</style>
		%sveltekit.head%
	</head>
	<body data-sveltekit-prerender-data>
		<div id="app">%sveltekit.body%</div>
	</body>
</html>
